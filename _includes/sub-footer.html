<div class="sub-footer">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="sub-footer-inner">
          {% if site.data.social %}
            {% include social.html %}
          {% endif %}
          <div class="copyright">
            <div class="text-end">
              <a href="/privacy">Privacy Notice</a>
              <a name="cookie-button"></a>
              <a class="fake-link" onClick="(function(){var _hsp = window._hsp = window._hsp || []; _hsp.push(['showBanner']); })()">Cookie Settings</a>
            </div>
            {% if site.data.seo.copyright_text %}
              {{ site.data.seo.copyright_text }}
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
