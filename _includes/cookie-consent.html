<style>
    #cookie-notice {padding: 0.5rem 1rem; display: none; text-align: center; position: fixed; bottom: 0; width: calc(100% - 2rem); background: #222; color: rgba(255,255,255,0.8);}
    #cookie-notice a {display: inline-block; cursor: pointer; margin-left: 1rem;}
    #cookie-notice a:first-of-type { margin-left: 5rem; }
    @media (max-width: 767px) {
        #cookie-notice span {display: block; padding-top: 3px; margin-bottom: 1rem;}
        #cookie-notice a {position: relative; bottom: 4px;}
    }
</style>
<div id="cookie-notice"><span>We would like to use third party cookies and scripts for functional and advertising purposes.</span><a id="cookie-notice-accept" class="btn btn-primary btn-sm">Approve</a><a id="cookie-notice-decline" class="btn btn-sm">Reject</a><a href="/privacy" class="btn btn-sm">More info</a></div>

<script>
  if(!readCookie('cookie-consent')) {
        document.getElementById('cookie-notice').style.display = 'block';
    }
    document.getElementById('cookie-notice-accept').addEventListener("click",function() {
        createCookie('cookie-consent','true',31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });
    document.getElementById('cookie-notice-decline').addEventListener("click",function() {
        createCookie('cookie-consent','false',31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });
</script>
